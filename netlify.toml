[build]
  # Netlify will run this command from the root
  command = "npm run build"
  # The static files generated by Vite are in frontend/dist
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  # This ensures that SPAs (Single Page Applications) work correctly
  # by redirecting all traffic to index.html when a direct route is refreshed.
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  # In production, Netlify will look for this variable to know where your backend is hosted.
  # If not set, it defaults to the local /api proxy (which will fail if the backend isn't there).
  # VITE_API_URL = "https://your-backend-url.railway.app"
